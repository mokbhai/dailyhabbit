packages:
  - 'apps/*'
  - 'packages/*'

minimumReleaseAge: 0

allowBuilds:
  '@nestjs/core': true
  esbuild: true
  sharp: true

catalog:
  # React
  '@types/react': ^19.2.14
  '@types/react-dom': ^19.2.3
  react: ^19.2.6
  react-dom: ^19.2.6

  # TypeScript
  '@types/node': ^25.9.0
  typescript: ^6.0.3

  # tRPC
  '@trpc/server': ^11.17.0
  '@trpc/client': ^11.17.0
  '@trpc/react-query': ^11.17.0

  # Validation
  zod: ^4.4.3

  # Build
  tsup: ^8.5.1
  tailwindcss: ^4.3.0
  '@tailwindcss/vite': ^4.3.0

  # Testing
  vitest: ^4.1.5
  '@testing-library/jest-dom': ^6.9.1
  '@testing-library/react': ^16.3.2
  '@testing-library/user-event': ^14.6.1
  jsdom: ^29.1.1

catalogs:
  dev-tools:
    eslint: ^10.4.0
    prettier: ^3.8.3
    prettier-plugin-astro: ^0.14.1
    '@typescript-eslint/eslint-plugin': ^8.59.4
    '@typescript-eslint/parser': ^8.59.4
