name: Release

# Manual CD: cut a versioned release, publish container images, and stage mobile assets.
# Automatic deploys still flow through CI → Build and Publish on main.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version tag (e.g. v1.0.0)'
        required: true
        type: string
      deploy:
        description: 'Run deploy dispatcher after image push'
        required: true
        type: boolean
        default: false
      public_api_url:
        description: 'PUBLIC_API_URL baked into mobile web bundle'
        required: true
        type: string
        default: 'https://api.drcode.app'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  verify:
    name: Verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install compatible Corepack
        run: npm install --global corepack@0.34.2

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify workspace
        run: pnpm verify

  discover:
    name: Discover deployable apps
    needs: verify
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_apps: ${{ steps.set.outputs.has_apps }}
    steps:
      - uses: actions/checkout@v4

      - name: Discover apps with a Dockerfile
        id: set
        run: |
          apps=$(find apps -maxdepth 2 -name Dockerfile -printf '%h\n' | sed 's#apps/##' | sort)
          matrix=$(printf '%s\n' "$apps" | grep -v '^$' | jq -R . | jq -cs .)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ -n "$apps" ]; then
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          fi

  build-images:
    name: Build ${{ matrix.app }}
    needs: discover
    if: ${{ needs.discover.outputs.has_apps == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image and tag
        id: image
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          version="${{ inputs.version }}"
          echo "image=${registry}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.version }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  mobile-assets:
    name: Prepare mobile bundle
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Install compatible Corepack
        run: npm install --global corepack@0.34.2

      - name: Enable Corepack
        run: corepack enable

      - name: Activate pinned pnpm
        run: corepack prepare pnpm@11.1.3 --activate

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Capacitor web bundle
        env:
          PUBLIC_API_URL: ${{ inputs.public_api_url }}
        run: pnpm --filter @workspace-starter/mobile build

      - name: Archive mobile web bundle
        run: tar -czf mobile-web-bundle.tar.gz -C apps/mobile www capacitor.config.ts package.json

      - name: Upload mobile bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-web-bundle
          path: mobile-web-bundle.tar.gz
          retention-days: 90

  release:
    name: Create GitHub Release
    needs: [verify, build-images, mobile-assets, discover]
    if: >-
      ${{
        needs.verify.result == 'success' &&
        needs.mobile-assets.result == 'success' &&
        (needs.discover.outputs.has_apps != 'true' || needs.build-images.result == 'success')
      }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download mobile bundle
        uses: actions/download-artifact@v4
        with:
          name: mobile-web-bundle

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.version }}
          name: DRCODE 75 Hard ${{ inputs.version }}
          generate_release_notes: true
          files: mobile-web-bundle.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy:
    name: Deploy (optional)
    needs: [discover, build-images, release]
    if: ${{ inputs.deploy && needs.discover.outputs.has_apps == 'true' && needs.build-images.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Resolve deploy contract
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          version="${{ inputs.version }}"
          apps='${{ needs.discover.outputs.matrix }}'
          images=$(echo "$apps" | jq -c --arg reg "$registry" --arg ver "$version" \
            'map({ (.): ($reg + "/" + . + ":" + $ver) }) | add')
          {
            echo "DEPLOY_REGISTRY=${registry}"
            echo "DEPLOY_SHA=${version}"
            echo "DEPLOY_APPS=$(echo "$apps" | jq -r 'join(",")')"
            echo "DEPLOY_IMAGES=${images}"
          } >> "$GITHUB_ENV"

      - name: Run deploy dispatcher
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
        run: node scripts/deploy/run.mjs
