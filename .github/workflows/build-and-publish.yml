name: Build and Publish

# Runs only after CI ("Verify") succeeds on main, so a red build can never be
# published or deployed. Builds one image per deployable app — an app is
# deployable iff it has apps/<name>/Dockerfile — pushes them to GHCR tagged by
# git SHA (and :latest), then invokes the host-agnostic deploy dispatcher.
#
# All deployable images are rebuilt on every run (predictable over clever).
# Products that want affected-only builds can filter the discover matrix.

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: build-publish-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  discover:
    name: Discover deployable apps
    # workflow_run only proceeds when CI passed; workflow_dispatch always runs.
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
      has_apps: ${{ steps.set.outputs.has_apps }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Discover apps with a Dockerfile
        id: set
        run: |
          apps=$(find apps -maxdepth 2 -name Dockerfile -printf '%h\n' | sed 's#apps/##' | sort)
          matrix=$(printf '%s\n' "$apps" | grep -v '^$' | jq -R . | jq -cs .)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          if [ -n "$apps" ]; then
            echo "has_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_apps=false" >> "$GITHUB_OUTPUT"
          fi
          echo "Deployable apps: ${apps:-none}"

  build:
    name: Build ${{ matrix.app }}
    needs: discover
    if: ${{ needs.discover.outputs.has_apps == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        app: ${{ fromJSON(needs.discover.outputs.matrix) }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Resolve image and tag
        id: image
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          sha="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          echo "image=${registry}/${{ matrix.app }}" >> "$GITHUB_OUTPUT"
          echo "sha=${sha}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/${{ matrix.app }}/Dockerfile
          push: true
          tags: |
            ${{ steps.image.outputs.image }}:${{ steps.image.outputs.sha }}
            ${{ steps.image.outputs.image }}:latest
          cache-from: type=gha,scope=${{ matrix.app }}
          cache-to: type=gha,mode=max,scope=${{ matrix.app }}

  deploy:
    name: Deploy
    needs: [discover, build]
    if: ${{ needs.discover.outputs.has_apps == 'true' }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.13.0

      - name: Resolve deploy contract
        id: contract
        run: |
          registry="${{ vars.DEPLOY_REGISTRY }}"
          if [ -z "$registry" ]; then
            registry="ghcr.io/${GITHUB_REPOSITORY,,}"
          fi
          sha="${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}"
          apps='${{ needs.discover.outputs.matrix }}'
          images=$(echo "$apps" | jq -c --arg reg "$registry" --arg sha "$sha" \
            'map({ (.): ($reg + "/" + . + ":" + $sha) }) | add')
          {
            echo "DEPLOY_REGISTRY=${registry}"
            echo "DEPLOY_SHA=${sha}"
            echo "DEPLOY_APPS=$(echo "$apps" | jq -r 'join(",")')"
            echo "DEPLOY_IMAGES=${images}"
          } >> "$GITHUB_ENV"

      - name: Run deploy dispatcher
        env:
          DEPLOY_TARGET: ${{ vars.DEPLOY_TARGET }}
        run: node scripts/deploy/run.mjs
